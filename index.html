<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景绘编程乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 40px 20px 24px;
            color: white;
        }

        header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 18px;
            opacity: 0.9;
        }

        input, textarea, button {
            font-family: inherit;
        }

        .password-row {
            margin-top: 20px;
        }

        .password-row input {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            text-align: center;
            width: 260px;
            outline: none;
        }

        .password-row button,
        .vibe-button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: white;
            cursor: pointer;
            margin-left: 8px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .password-row button:hover,
        .vibe-button:hover {
            opacity: 0.9;
        }

        .password-row button:active,
        .vibe-button:active,
        .play-btn:active {
            transform: scale(0.96);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px 40px 45px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s, opacity 0.3s, outline 0.2s;
            cursor: pointer;
            touch-action: manipulation;
            position: relative;
            outline: 4px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .game-card.selected {
            outline-color: #ffd54f;
            box-shadow: 0 0 0 7px rgba(255,213,79,0.35), 0 15px 40px rgba(0,0,0,0.3);
        }

        .game-card.locked {
            opacity: 0.4;
            pointer-events: none;
        }

        .game-preview {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .game-card:nth-child(1) .game-preview { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .game-card:nth-child(2) .game-preview { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .game-card:nth-child(3) .game-preview { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .game-card:nth-child(4) .game-preview { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .game-card:nth-child(5) .game-preview { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        .game-card:nth-child(6) .game-preview { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffecd2 100%); }

        .game-info {
            padding: 20px;
        }

        .game-info h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .game-info p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            min-height: 66px;
        }

        .card-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.55);
            color: white;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            transition: opacity 0.3s;
            touch-action: manipulation;
        }

        .vibecoding-shell {
            max-width: 1200px;
            margin: 0 auto 36px;
            padding: 0 40px;
        }

        .vibecoding-panel {
            background: rgba(255,255,255,0.96);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 18px 50px rgba(0,0,0,0.28);
        }

        .vibe-header {
            padding: 22px 24px;
            background: linear-gradient(135deg, #fff3b0 0%, #ffcfdf 55%, #c8e7ff 100%);
            color: #293241;
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
        }

        .vibe-header h2 {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .vibe-header p {
            color: #4b5563;
            font-size: 15px;
            line-height: 1.5;
        }

        .vibe-lock {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .vibe-lock input {
            width: 200px;
            padding: 10px 14px;
            border: 2px solid rgba(102,126,234,0.25);
            border-radius: 14px;
            outline: none;
            font-size: 15px;
            text-align: center;
        }

        .vibe-workspace {
            display: grid;
            grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
            gap: 18px;
            padding: 18px;
        }

        .preview-box,
        .prompt-box {
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            background: white;
        }

        .box-title {
            padding: 12px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e5e7eb;
            color: #374151;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .selected-game-name {
            color: #764ba2;
            font-weight: 800;
        }

        #gamePreviewFrame {
            display: block;
            width: 100%;
            height: 560px;
            border: 0;
            background: #fff;
        }

        .preview-empty {
            min-height: 560px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #6b7280;
            padding: 28px;
            background: repeating-linear-gradient(45deg, #fafafa, #fafafa 14px, #f3f4f6 14px, #f3f4f6 28px);
        }

        .prompt-content {
            padding: 16px;
        }

        #vibePrompt {
            width: 100%;
            min-height: 190px;
            resize: vertical;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 14px;
            font-size: 15px;
            line-height: 1.6;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
        }

        #vibePrompt:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
        }

        .vibe-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .vibe-button {
            margin: 0;
            border-radius: 14px;
            padding: 12px 14px;
        }

        .vibe-button.secondary {
            background: linear-gradient(135deg, #f97316, #ec4899);
        }

        .vibe-button.ghost {
            background: #eef2ff;
            color: #4338ca;
        }

        .vibe-button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .status-area {
            margin-top: 12px;
            padding: 12px;
            min-height: 48px;
            border-radius: 14px;
            background: #f9fafb;
            color: #374151;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            user-select: text;
            -webkit-user-select: text;
        }

        .status-area.ok { background: #ecfdf5; color: #047857; }
        .status-area.warn { background: #fff7ed; color: #c2410c; }
        .status-area.error { background: #fef2f2; color: #b91c1c; }

        .hint-list {
            margin-top: 12px;
            color: #6b7280;
            font-size: 13px;
            line-height: 1.7;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .vibe-workspace {
                grid-template-columns: 1fr;
            }
            #gamePreviewFrame,
            .preview-empty {
                height: 460px;
                min-height: 460px;
            }
        }

        @media (max-width: 600px) {
            header h1 { font-size: 36px; }
            .game-grid { grid-template-columns: 1fr; padding: 20px; }
            .vibecoding-shell { padding: 0 20px; }
            .vibe-header h2 { font-size: 24px; }
            .vibe-actions { grid-template-columns: 1fr; }
            .password-row input { width: 220px; margin-bottom: 8px; }
            .password-row button { margin-left: 0; }
        }

        @media (max-width: 400px) {
            header h1 { font-size: 28px; }
            header p { font-size: 14px; }
            .game-info h2 { font-size: 20px; }
            .game-info p { font-size: 13px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>景绘编程乐园</h1>
        <p id="headerSubtitle">在这里，用代码创造快乐</p>
        <div class="password-row" id="gamePasswordRow">
            <input type="password" id="globalPassword" placeholder="输入密码解锁所有游戏" maxlength="10">
            <button onclick="checkGlobalPassword()">进入</button>
        </div>
    </header>

    <main>
        <div class="game-grid" id="gameGrid"></div>

        <section class="vibecoding-shell" id="vibecoding">
            <div class="vibecoding-panel">
                <div class="vibe-header">
                    <div>
                        <h2>儿童 VibeCoding</h2>
                        <p>在下面写一句话，就可以新建小游戏，或选择上面的游戏继续修改。游戏会在独立预览框里运行，出错也可以继续修。</p>
                    </div>
                    <div class="vibe-lock" id="vibeLockBox">
                        <input type="password" id="vibePassword" placeholder="输入编程密码" maxlength="10">
                        <button class="vibe-button" onclick="unlockVibeCoding()">解锁编程</button>
                    </div>
                </div>

                <div class="vibe-workspace">
                    <div class="preview-box">
                        <div class="box-title">
                            <span>独立游戏预览框</span>
                            <span>当前选中：<span class="selected-game-name" id="selectedGameName">未选择</span></span>
                        </div>
                        <div id="previewEmpty" class="preview-empty">
                            <div>
                                <strong>先解锁编程，再选择上方游戏或直接新建游戏。</strong><br>
                                预览框会使用 iframe 独立运行游戏，主页面的提示词区域不会被游戏错误影响。
                            </div>
                        </div>
                        <iframe id="gamePreviewFrame" sandbox="allow-scripts allow-same-origin" style="display:none;"></iframe>
                    </div>

                    <div class="prompt-box">
                        <div class="box-title">
                            <span>提示词区域</span>
                            <span id="vibeModeText">已锁定</span>
                        </div>
                        <div class="prompt-content">
                            <textarea id="vibePrompt" placeholder="例如：帮我做一个接水果的游戏，篮子左右移动，接到苹果加分，接到炸弹扣分。" disabled></textarea>
                            <div class="vibe-actions">
                                <button class="vibe-button secondary" id="createGameBtn" onclick="createVibeGame()" disabled>新建游戏</button>
                                <button class="vibe-button" id="modifyGameBtn" onclick="modifySelectedGame()" disabled>修改选中游戏</button>
                                <button class="vibe-button ghost" id="clearSelectBtn" onclick="clearSelectedGame()" disabled>取消选择</button>
                                <button class="vibe-button ghost" onclick="fillExamplePrompt()">填入示例</button>
                            </div>
                            <div class="status-area" id="vibeStatus">编程功能需要密码 311051 解锁。</div>
                            <div class="hint-list">
                                提示：可以写“把角色换成小猫”“增加倒计时”“让背景变成太空”“修复刚才的报错”。每次提交都会固定保存当前游戏的最新版本。
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>景绘编程乐园 &copy; 2024 | 用代码创造快乐</p>
    </footer>

<script>
const GLOBAL_PASSWORD = '150113';
const VIBE_PASSWORD = '311051';

let isUnlocked = false;
let isVibeUnlocked = false;
let selectedGame = null;
let selectedCardId = null;
let dynamicGames = [];

const builtInGames = [
    {
        id: 'go-game',
        type: 'builtin',
        title: '围棋对弈',
        icon: '⚫',
        url: 'go-game.html',
        description: '经典围棋游戏！输入密码进入房间，支持在线对战。可创建房间、观战、限时落子、保存棋局回放。'
    },
    {
        id: 'whack-a-mole',
        type: 'builtin',
        title: '打地鼠',
        icon: '🐹',
        url: 'whack-a-mole.html',
        description: '经典的打地鼠游戏！考验你的反应速度，看看能在10秒内打到多少只地鼠。'
    },
    {
        id: 'racing-game',
        type: 'builtin',
        title: '极速躲避赛车',
        icon: '🏎️',
        url: 'racing-game.html',
        description: '使用方向键控制赛车躲避障碍物，坚持越久得分越高，难度会逐渐增加。'
    },
    {
        id: 'shooting-game',
        type: 'builtin',
        title: 'WASD射击',
        icon: '🎯',
        url: 'shooting-game.html',
        description: 'WASD移动，鼠标瞄准射击！消灭不断涌来的敌人，挑战你的极限分数。'
    },
    {
        id: 'campus-survival',
        type: 'builtin',
        title: '校园求生',
        icon: '🏫',
        url: 'campus-survival.html',
        description: '3D冒险游戏！选择角色，在风雨雪雹中从校门口穿越到学校教室，收集道具保护自己。'
    },
    {
        id: 'rainbow-tetris',
        type: 'builtin',
        title: '七彩俄罗斯方块',
        icon: '🌈',
        url: 'rainbow-tetris.html',
        description: '经典俄罗斯方块玩法，每块方块拥有7种绚丽颜色之一。同色相连且小方格超过10个时会自动消除！'
    },
    {
        id: 'english',
        type: 'builtin',
        title: '快乐英语听力',
        icon: '🎧',
        url: 'english.html',
        description: 'B站英语听力练习！支持输入 Bilibili 链接播放，默认搜索英语视频，录音听写，保存记录。'
    }
];

function renderGameCards() {
    const grid = document.getElementById('gameGrid');
    const allGames = [...builtInGames, ...dynamicGames];

    grid.innerHTML = allGames.map(game => {
        const isDynamic = game.type === 'vibe';
        const tag = isDynamic ? '<span class="card-tag">编程作品</span>' : '';
        const playText = isDynamic ? '打开作品' : (game.id === 'english' ? '开始学习' : '开始游戏');
        const lockedClass = (!isUnlocked && !isVibeUnlocked) ? ' locked' : '';
        const selectedClass = selectedCardId === game.id ? ' selected' : '';
        return `
            <div class="game-card${lockedClass}${selectedClass}" data-game-id="${escapeAttr(game.id)}" onclick="selectGame('${escapeAttr(game.id)}')">
                ${tag}
                <div class="game-preview">${game.icon || '🎮'}</div>
                <div class="game-info">
                    <h2>${escapeHtml(game.title)}</h2>
                    <p>${escapeHtml(game.description || '这是一个由 VibeCoding 生成的小游戏，可以继续用提示词修改。')}</p>
                    <a href="${escapeAttr(game.url || '#')}" class="play-btn" onclick="event.stopPropagation();">${playText}</a>
                </div>
            </div>
        `;
    }).join('');
}

function checkGlobalPassword() {
    const input = document.getElementById('globalPassword');
    if (input.value.trim() === GLOBAL_PASSWORD) {
        isUnlocked = true;
        localStorage.setItem('gameUnlocked', 'true');
        showToast('游戏已解锁');
        applyUnlockState();
    } else {
        showToast('密码错误');
        input.value = '';
    }
}

function unlockVibeCoding() {
    const input = document.getElementById('vibePassword');
    if (input.value.trim() === VIBE_PASSWORD) {
        isVibeUnlocked = true;
        localStorage.setItem('vibeCodingUnlocked', 'true');
        showToast('编程功能已解锁');
        applyUnlockState();
    } else {
        showToast('编程密码错误');
        input.value = '';
    }
}

function applyUnlockState() {
    if (isUnlocked) {
        document.getElementById('gamePasswordRow').style.display = 'none';
        document.getElementById('headerSubtitle').textContent = '已解锁 - 在这里，用代码创造快乐';
    }

    if (isVibeUnlocked) {
        document.getElementById('vibeLockBox').style.display = 'none';
        document.getElementById('vibePrompt').disabled = false;
        document.getElementById('createGameBtn').disabled = false;
        document.getElementById('clearSelectBtn').disabled = false;
        document.getElementById('vibeModeText').textContent = '可编程';
        setStatus('编程已解锁。可以选择上方游戏来修改，也可以直接新建游戏。', 'ok');
    }

    document.getElementById('modifyGameBtn').disabled = !isVibeUnlocked || !selectedGame;
    renderGameCards();
}

async function loadDynamicGames() {
    try {
        const res = await fetch('/api/games');
        if (!res.ok) return;
        const data = await res.json();
        dynamicGames = (data.games || []).map(game => ({
            id: game.id,
            type: 'vibe',
            title: game.title || '编程小游戏',
            icon: game.icon || '🎮',
            description: game.description || '这是一个由 VibeCoding 生成的小游戏，可以继续修改。',
            url: `/api/games?id=${encodeURIComponent(game.id)}&view=1`,
            updatedAt: game.updatedAt
        }));
        renderGameCards();
    } catch (error) {
        console.warn('加载编程作品失败：', error);
    }
}

async function selectGame(gameId) {
    if (!isVibeUnlocked) {
        showToast('请先输入编程密码 311051');
        document.getElementById('vibePassword').focus();
        return;
    }

    const game = [...builtInGames, ...dynamicGames].find(item => item.id === gameId);
    if (!game) return;

    setStatus(`正在加载《${game.title}》...`, 'warn');
    try {
        let html;
        if (game.type === 'vibe') {
            const res = await fetch(`/api/games?id=${encodeURIComponent(game.id)}`);
            if (!res.ok) throw new Error('读取编程作品失败');
            const data = await res.json();
            html = data.game && data.game.html;
        } else {
            const res = await fetch(game.url, { cache: 'no-store' });
            if (!res.ok) throw new Error('读取游戏源码失败');
            html = await res.text();
        }

        if (!html) throw new Error('游戏内容为空');
        selectedGame = { ...game, html };
        selectedCardId = game.id;
        document.getElementById('selectedGameName').textContent = game.title;
        document.getElementById('modifyGameBtn').disabled = false;
        renderGameCards();
        previewHtml(html);
        setStatus(`已选择《${game.title}》。现在可以在提示词中描述你想怎么改。`, 'ok');
        document.getElementById('vibecoding').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (error) {
        setStatus(`加载失败：${error.message}`, 'error');
    }
}

function clearSelectedGame() {
    selectedGame = null;
    selectedCardId = null;
    document.getElementById('selectedGameName').textContent = '未选择';
    document.getElementById('modifyGameBtn').disabled = true;
    renderGameCards();
    setStatus('已取消选择。可以直接新建游戏。', 'ok');
}

async function createVibeGame() {
    if (!guardVibeReady()) return;
    const prompt = document.getElementById('vibePrompt').value.trim();
    if (!prompt) {
        setStatus('请先写下你想创建什么游戏。', 'warn');
        return;
    }

    await generateAndSave({
        action: 'new',
        prompt,
        baseTitle: guessTitleFromPrompt(prompt),
        baseIcon: '🎮'
    });
}

async function modifySelectedGame() {
    if (!guardVibeReady()) return;
    if (!selectedGame) {
        setStatus('请先选择一个游戏，或点击“新建游戏”。', 'warn');
        return;
    }
    const prompt = document.getElementById('vibePrompt').value.trim();
    if (!prompt) {
        setStatus('请先写下你想怎么修改这个游戏。', 'warn');
        return;
    }

    await generateAndSave({
        action: 'modify',
        prompt,
        sourceCode: selectedGame.html,
        sourceGameId: selectedGame.id,
        baseTitle: selectedGame.type === 'vibe' ? selectedGame.title : `${selectedGame.title}（编程版）`,
        baseIcon: selectedGame.icon || '🎮'
    });
}

async function generateAndSave(payload) {
    setBusy(true);
    setStatus('正在生成游戏代码，请稍等...', 'warn');

    try {
        const generateRes = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const generateData = await generateRes.json();
        if (!generateRes.ok || !generateData.success) {
            throw new Error(generateData.error || '生成失败');
        }

        const html = generateData.html;
        previewHtml(html);
        setStatus('代码已生成，正在固定保存最新版本...', 'warn');

        const saveRes = await fetch('/api/games', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: getSaveId(payload),
                title: generateData.title || payload.baseTitle,
                icon: generateData.icon || payload.baseIcon || '🎮',
                description: generateData.description || `根据提示词生成：${payload.prompt.slice(0, 80)}`,
                prompt: payload.prompt,
                html
            })
        });
        const saveData = await saveRes.json();
        if (!saveRes.ok || !saveData.success) {
            throw new Error(saveData.error || '保存失败，请确认 Cloudflare KV 已绑定为 GAMES_KV');
        }

        await loadDynamicGames();
        const savedGame = saveData.game;
        selectedGame = {
            id: savedGame.id,
            type: 'vibe',
            title: savedGame.title,
            icon: savedGame.icon || '🎮',
            description: savedGame.description,
            url: `/api/games?id=${encodeURIComponent(savedGame.id)}&view=1`,
            html
        };
        selectedCardId = savedGame.id;
        document.getElementById('selectedGameName').textContent = savedGame.title;
        document.getElementById('modifyGameBtn').disabled = false;
        renderGameCards();
        setStatus(`已固定保存《${savedGame.title}》。它已经自动加入上方游戏卡片列表。`, 'ok');
    } catch (error) {
        setStatus(`生成或保存失败：${error.message}\n可以修改提示词后继续提交。`, 'error');
    } finally {
        setBusy(false);
    }
}

function getSaveId(payload) {
    if (payload.action === 'modify' && selectedGame && selectedGame.type === 'vibe') {
        return selectedGame.id;
    }
    if (payload.action === 'modify' && selectedGame) {
        return `mod-${selectedGame.id}`;
    }
    return '';
}

function previewHtml(html) {
    const frame = document.getElementById('gamePreviewFrame');
    const empty = document.getElementById('previewEmpty');
    empty.style.display = 'none';
    frame.style.display = 'block';
    frame.srcdoc = injectErrorReporter(html);
}

function injectErrorReporter(html) {
    const reporter = `
<script>
(function(){
    window.onerror = function(message, source, lineno, colno, error) {
        parent.postMessage({ type: 'vibecoding-runtime-error', message: String(message), line: lineno, column: colno, stack: error && error.stack ? String(error.stack) : '' }, '*');
        return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        parent.postMessage({ type: 'vibecoding-runtime-error', message: reason && reason.message ? String(reason.message) : String(reason) }, '*');
    });
})();
<\/script>`;

    if (/<\/body>/i.test(html)) {
        return html.replace(/<\/body>/i, reporter + '</body>');
    }
    return html + reporter;
}

window.addEventListener('message', (event) => {
    if (!event.data || event.data.type !== 'vibecoding-runtime-error') return;
    const errorText = event.data.line
        ? `游戏运行时报错：${event.data.message}（第 ${event.data.line} 行）\n可以在提示词里写“修复这个报错：${event.data.message}”。`
        : `游戏运行时报错：${event.data.message}\n可以继续提交提示词修复。`;
    setStatus(errorText, 'error');
});

function guardVibeReady() {
    if (!isVibeUnlocked) {
        setStatus('请先输入编程密码 311051。', 'warn');
        return false;
    }
    return true;
}

function setBusy(isBusy) {
    document.getElementById('createGameBtn').disabled = isBusy || !isVibeUnlocked;
    document.getElementById('modifyGameBtn').disabled = isBusy || !isVibeUnlocked || !selectedGame;
}

function setStatus(message, type = '') {
    const status = document.getElementById('vibeStatus');
    status.textContent = message;
    status.className = `status-area ${type}`.trim();
}

function fillExamplePrompt() {
    const examples = [
        '做一个接水果小游戏：水果从天上掉下来，玩家用左右键控制篮子，接到苹果加 1 分，接到炸弹扣 1 条生命。',
        '把当前游戏变得更适合小朋友：颜色更鲜艳，增加简单说明，成功时播放开心的音效。',
        '给这个游戏增加 30 秒倒计时和重新开始按钮，结束后显示鼓励的话。',
        '修复刚才的报错，并保持游戏玩法不变。'
    ];
    document.getElementById('vibePrompt').value = examples[Math.floor(Math.random() * examples.length)];
}

function guessTitleFromPrompt(prompt) {
    const clean = prompt.replace(/[，。！？!?,.]/g, ' ').trim();
    if (!clean) return '编程小游戏';
    const match = clean.match(/(?:做一个|制作一个|生成一个|创建一个|帮我做一个)?([^\s]{2,10}?游戏)/);
    return match ? match[1] : '编程小游戏';
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.textContent = msg;
    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:white;padding:10px 25px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;';
    document.body.appendChild(toast);
    setTimeout(() => toast.style.opacity = '1', 10);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
}

function escapeHtml(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#096;');
}

function boot() {
    if (localStorage.getItem('gameUnlocked') === 'true') isUnlocked = true;
    if (localStorage.getItem('vibeCodingUnlocked') === 'true') isVibeUnlocked = true;

    document.getElementById('globalPassword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkGlobalPassword();
    });
    document.getElementById('vibePassword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') unlockVibeCoding();
    });

    renderGameCards();
    applyUnlockState();
    loadDynamicGames();
}

boot();
</script>
